name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      # npm ci fails here with EBADPLATFORM on esbuild's netbsd-arm64 optional binary — a real
      # npm bug where it hard-fails on a legitimately-skippable cross-platform optional dep
      # instead of silently skipping it (confirmed reproducing on ubuntu-latest, not just
      # locally). npm install doesn't have this problem and is what's verified working.
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
